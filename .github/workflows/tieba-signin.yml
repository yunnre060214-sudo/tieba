name: 百度贴吧自动签到

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tieba-signin-${{ github.repository }}
  cancel-in-progress: false

jobs:
  signin:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 类型检查、测试与构建
        run: npm run check

      - name: 运行签到并发送结果邮件
        env:
          BDUSS: ${{ secrets.BDUSS }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: npm start
